version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pinky
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pinky}
      POSTGRES_DB: pinky
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinky -d pinky"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://pinky:${POSTGRES_PASSWORD:-pinky}@db:5432/pinky?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-dokploy}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  front:
    build:
      context: ./front
      args:
        # public URL of the backend — set this in Dokploy to your API domain
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
